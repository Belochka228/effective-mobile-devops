# ── nginx.conf ──────────────────────────────────────────────────────────────
# Reverse proxy: accepts requests on port 80 and forwards them to the
# backend service (resolved by Docker's internal DNS via service name).
# ────────────────────────────────────────────────────────────────────────────

# Run nginx worker processes as a non-root user
user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ── Upstream ────────────────────────────────────────────────────────────
    # "backend" is the Docker Compose service name, resolved via Docker DNS.
    upstream backend_upstream {
        server backend:8080;
    }

    # ── Server block ────────────────────────────────────────────────────────
    server {
        listen       80;
        server_name  _;

        location / {
            proxy_pass         http://backend_upstream;

            # Pass standard proxy headers so the backend knows the real client
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout  5s;
            proxy_read_timeout     30s;
        }
    }
}